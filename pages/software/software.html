<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПО и Прошивки — ПИРС</title>
    
    <!-- Общие стили проекта -->
    <link rel="stylesheet" href="../../common/head_style.css">
    <link rel="stylesheet" href="../../common/footer_style.css">
    
    <!-- Специфические стили этой страницы -->
    <link rel="stylesheet" href="software.css">
</head>
<body>

    <!-- Место для динамической шапки -->
    <div id="header-placeholder"></div>

    <main class="container software-page">
        <h1 class="page-main-title">Программное обеспечение и прошивки</h1>

        <div class="software-item">
            <h2 class="software-subtitle">Программное обеспечение</h2>
            <div class="download-row">
                <!-- Путь обновлен согласно структуре media/downloads -->
                <a href="../../media/downloads/PEPE.rar" class="btn-software" download>
                    Скачать программное обеспечение
                </a>
                <span class="version-tag">версия v1.0.4</span>
            </div>
        </div>

        <div class="software-item">
            <h2 class="software-subtitle">Прошивки</h2>
            <div class="download-row">
                <!-- Путь обновлен согласно структуре media/downloads -->
                <a href="../../media/downloads/PEPE.rar" class="btn-software" download>
                    Скачать актуальную прошивку
                </a>
                <span class="version-tag">версия v1.2.0</span>
            </div>
        </div>
    </main>

    <!-- Место для динамического подвала -->
    <div id="footer-placeholder"></div>

    <script>
        function loadBlock(id, path) {
            fetch(path)
                .then(res => res.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                    if(id === 'header-placeholder') initMobileMenu();
                });
        }

        function initMobileMenu() {
            const btn = document.getElementById('mobile-menu');
            const nav = document.querySelector('.nav-list-simple');
            if(btn && nav) {
                btn.onclick = () => {
                    nav.classList.toggle('active');
                    btn.classList.toggle('is-active');
                };
            }
        }

        loadBlock('header-placeholder', '../../common/_head.html');
        loadBlock('footer-placeholder', '../../common/_footer.html');
    </script>
</body>
</html>
